name: E2E Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# This is the single entry point for the entire CI pipeline.
#
# What runs and when:
#   • Every push (any branch)         →  Lint only
#   • Push to main (PR merged)        →  Lint  →  Cross-browser regression
#   • Manual trigger (this file)      →  Lint  →  Cross-browser regression
#                                         (user chooses browser or runs all 3)
#   • Nightly schedule                →  DISABLED — see instructions below
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: ['**']

  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test — choose one or "all" for full cross-browser run'
        required: true
        default: all
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit

  # ── Nightly schedule ──────────────────────────────────────────────────────
  # Disabled until the application reaches production stability.
  #
  # HOW TO ENABLE (when production is ready):
  #   1. Uncomment the four lines below.
  #   2. Adjust the cron expression if a different time is preferred.
  #      Format: 'minute hour day-of-month month day-of-week' (all UTC)
  #      Example: '0 2 * * *' = every night at 02:00 UTC
  #   3. Commit and push to main — GitHub picks up the schedule automatically.
  #
  # schedule:
  #   - cron: '0 2 * * *'

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
#   1. lint               — Always runs; calls the reusable lint.yml workflow
#   2. api-tests          — Mandatory gate; runs all @api specs before any UI run;
#                            calls the reusable api-tests.yml workflow
#   3. cross-browser-tests — Runs only on main / manual / schedule;
#                            blocked until api-tests passes;
#                            calls the reusable cross-browser-tests.yml workflow
#   4. self-heal          — Runs only when api-tests or cross-browser-tests fail;
#                            downloads test-results-json-* artifacts uploaded by
#                            sibling jobs (same github.run_id), calls GPT-4o to
#                            classify failures, and opens a PR with fixes/bug reports.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  # ── 2. API Tests (mandatory gate) ────────────────────────────────────────
  # Runs on the same conditions as cross-browser-tests.
  # cross-browser-tests will not start until this job succeeds.
  api-tests:
    name: API Tests
    needs: lint
    if: |
      github.ref == 'refs/heads/main'   ||
      github.ref == 'refs/heads/master' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    uses: ./.github/workflows/api-tests.yml
    secrets: inherit

  # ── 3. Cross-Browser Regression ───────────────────────────────────────────
  # Skipped on pushes to non-main branches (e.g. feature branches).
  # Always runs on main, on manual dispatch, and on schedule.
  # Blocked until api-tests passes — API health is confirmed before UI regression.
  cross-browser-tests:
    name: Cross-Browser Tests
    needs: [lint, api-tests]
    if: |
      github.ref == 'refs/heads/main'   ||
      github.ref == 'refs/heads/master' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    uses: ./.github/workflows/cross-browser-tests.yml
    with:
      browser: ${{ inputs.browser || 'all' }}
    secrets: inherit

  # ── 4. Self-Heal (only when api-tests or cross-browser-tests fail) ─────────
  # Blocked until both test jobs complete (success, failure, or skip).
  # always() prevents this job being skipped when a dependency fails.
  # Delegates to the reusable self-heal.yml workflow.
  self-heal:
    name: Self-Heal
    needs: [api-tests, cross-browser-tests]
    if: |
      always() &&
      (needs.api-tests.result == 'failure' ||
       needs.cross-browser-tests.result == 'failure')
    permissions:
      contents: read
      issues: write
      actions: read
    uses: ./.github/workflows/self-heal.yml
    secrets: inherit
