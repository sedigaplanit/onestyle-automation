name: E2E Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# This is the single entry point for the entire CI pipeline.
#
# What runs and when:
#   • Every push (any branch)         →  Lint only
#   • Push to main (PR merged)        →  Lint  →  Cross-browser regression
#   • Manual trigger (this file)      →  Lint  →  Cross-browser regression
#                                         (user chooses browser or runs all 3)
#   • Nightly schedule                →  DISABLED — see instructions below
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: ['**']

  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test — choose one or "all" for full cross-browser run'
        required: true
        default: all
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit

  # ── Nightly schedule ──────────────────────────────────────────────────────
  # Disabled until the application reaches production stability.
  #
  # HOW TO ENABLE (when production is ready):
  #   1. Uncomment the four lines below.
  #   2. Adjust the cron expression if a different time is preferred.
  #      Format: 'minute hour day-of-month month day-of-week' (all UTC)
  #      Example: '0 2 * * *' = every night at 02:00 UTC
  #   3. Commit and push to main — GitHub picks up the schedule automatically.
  #
  # schedule:
  #   - cron: '0 2 * * *'

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
#   1. lint               — Always runs; calls the reusable lint.yml workflow
#   2. api-tests          — Mandatory gate; runs all @api specs before any UI run;
#                            calls the reusable api-tests.yml workflow
#   3. cross-browser-tests — Runs only on main / manual / schedule;
#                            blocked until api-tests passes;
#                            calls the reusable cross-browser-tests.yml workflow
#   4. self-heal          — Runs only when api-tests or cross-browser-tests fail;
#                            downloads test-results-json-* artifacts uploaded by
#                            sibling jobs (same github.run_id), calls GPT-4o to
#                            classify failures, and opens a PR with fixes/bug reports.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  # ── 2. API Tests (mandatory gate) ────────────────────────────────────────
  # Runs on the same conditions as cross-browser-tests.
  # cross-browser-tests will not start until this job succeeds.
  api-tests:
    name: API Tests
    needs: lint
    if: |
      github.ref == 'refs/heads/main'   ||
      github.ref == 'refs/heads/master' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    uses: ./.github/workflows/api-tests.yml
    secrets: inherit

  # ── 3. Cross-Browser Regression ───────────────────────────────────────────
  # Skipped on pushes to non-main branches (e.g. feature branches).
  # Always runs on main, on manual dispatch, and on schedule.
  # Blocked until api-tests passes — API health is confirmed before UI regression.
  cross-browser-tests:
    name: Cross-Browser Tests
    needs: [lint, api-tests]
    if: |
      github.ref == 'refs/heads/main'   ||
      github.ref == 'refs/heads/master' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    uses: ./.github/workflows/cross-browser-tests.yml
    with:
      browser: ${{ inputs.browser || 'all' }}
    secrets: inherit

  # ── 4. Self-Heal (only when tests fail) ───────────────────────────────────
  # Runs after both test jobs complete (success, failure, or skip).
  # always() is required so this job is not skipped when a dependency fails.
  # Downloads test-results-json-* artifacts from THIS run (github.run_id) —
  # no cross-run artifact lookup needed.
  self-heal:
    name: Self-Heal
    needs: [api-tests, cross-browser-tests]
    if: |
      always() &&
      (needs.api-tests.result == 'failure' ||
       needs.cross-browser-tests.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # checkout only — no commits needed
      issues: write # create GitHub Issues for the Copilot coding agent
      actions: read # download artifacts from this run
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download test results from this run
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.run_id }}
          pattern: test-results-json-*
          path: test-results
          merge-multiple: true
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge results JSON files
        run: |
          node --input-type=module << 'EOF'
          import { mkdirSync, readdirSync, readFileSync, writeFileSync } from 'node:fs'
          import path from 'node:path'

          const dir = 'test-results'
          mkdirSync(dir, { recursive: true })

          const files = readdirSync(dir).filter(
            f => f.startsWith('results') && f.endsWith('.json') && f !== 'merged-results.json'
          )

          if (files.length === 0) {
            console.log('[merge] No result JSON files found — creating empty manifest')
            writeFileSync(path.join(dir, 'merged-results.json'), JSON.stringify({ suites: [] }, null, 2))
            process.exit(0)
          }

          const allSuites = []
          for (const f of files) {
            try {
              const data = JSON.parse(readFileSync(path.join(dir, f), 'utf-8'))
              allSuites.push(...(data.suites ?? []))
              console.log(`[merge] Included ${f}`)
            } catch (e) {
              console.warn(`[merge] Could not parse ${f}: ${e.message}`)
            }
          }

          writeFileSync(
            path.join(dir, 'merged-results.json'),
            JSON.stringify({ suites: allSuites }, null, 2)
          )
          console.log(`[merge] Merged ${files.length} file(s) into merged-results.json`)
          EOF

      # ── Create GitHub Issues for the Copilot coding agent ──────────────────
      # self-heal.mjs reads each failure, builds a rich issue body with spec
      # source + page-object source, then calls the GitHub Issues REST API.
      # Copilot picks up each issue and opens a PR with a fix or bug report.
      - name: Create issues for Copilot coding agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Override COPILOT_ASSIGNEE if your Enterprise uses a different bot login
          COPILOT_ASSIGNEE: ${{ vars.COPILOT_ASSIGNEE || 'copilot' }}
        run: node scripts/self-heal.mjs --results test-results/merged-results.json
