name: Cross-Browser Regression

# Reusable workflow — called by e2e.yml
# Accepts a 'browser' input: "chromium" | "firefox" | "webkit" | "all" (default)
on:
  workflow_call:
    inputs:
      browser:
        description: 'Browser(s) to test — "all" runs all three'
        required: false
        default: 'all'
        type: string
    secrets:
      BASE_URL:
        required: true
      USER_NAME:
        required: true
      PASSWORD:
        required: true

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
#   1. setup        — resolves which browsers to test
#   2. test         — Playwright E2E, one parallel job per browser
#   3. merge-report — downloads per-browser blob reports, merges into one HTML
#
# Total elapsed-time budget: ≤ 60 minutes
#   setup (5 min) + test in parallel (45 min) + merge-report (10 min) = 60 min
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. Resolve browser matrix ─────────────────────────────────────────────
  # "all" (or empty)  →  run all three browsers in parallel
  # any single name  →  run only that browser
  setup:
    name: Resolve Browser Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      browsers: ${{ steps.resolve.outputs.browsers }}
    steps:
      - name: Determine which browsers to run
        id: resolve
        run: |
          if [[ "${{ inputs.browser }}" != "all" && -n "${{ inputs.browser }}" ]]; then
            echo 'browsers=["${{ inputs.browser }}"]' >> $GITHUB_OUTPUT
          else
            echo 'browsers=["chromium","firefox","webkit"]' >> $GITHUB_OUTPUT
          fi

  # ── 2. E2E Tests ──────────────────────────────────────────────────────────
  test:
    name: E2E — ${{ matrix.browser }}
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(needs.setup.outputs.browsers) }}
    env:
      CI: true
      BASE_URL: ${{ secrets.BASE_URL }}
      USER_NAME: ${{ secrets.USER_NAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      BROWSER: ${{ matrix.browser }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser — ${{ matrix.browser }}
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.browser }} --reporter=blob

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.browser }}
          path: blob-report/
          retention-days: 2

      - name: Upload traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: traces-${{ matrix.browser }}
          path: test-results/
          retention-days: 2

  # ── 3. Merge blob reports into a single HTML report ───────────────────────
  merge-report:
    name: Merge & Publish Test Report
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge into single HTML report
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 2
