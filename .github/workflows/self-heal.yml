name: Self-Heal

# ─────────────────────────────────────────────────────────────────────────────
# Standalone self-heal workflow — for nightly and manual runs.
#
# Failure-triggered healing is handled INLINE by the e2e.yml pipeline as job 4
# (self-heal), which runs in the same workflow execution and downloads artifacts
# directly via github.run_id — no cross-run lookup needed.
#
# This file covers the remaining cases:
#   • Nightly schedule — runs a fresh @smoke + API suite then heals any failures.
#   • Manual dispatch  — analyze a specific run (by run_id) or run a fresh suite.
#
# Requirements:
#   • GitHub Copilot subscription — GITHUB_TOKEN calls models.inference.ai.azure.com.
#   • Secrets: BASE_URL, USER_NAME, PASSWORD, API_URL (needed for fresh test runs).
# ─────────────────────────────────────────────────────────────────────────────

on:
  # ── Independent nightly run: runs a fresh smoke suite then heals ──────────
  schedule:
    - cron: '0 3 * * *'

  # ── Manual: analyze a specific failed run or run a fresh smoke suite ──────
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID to analyze (leave empty to run a fresh smoke suite)'
        required: false
        type: string
      dry_run:
        description: 'Dry run — analyze only, do not write files or open a PR'
        required: false
        type: boolean
        default: false

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  heal:
    name: Self-Heal
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      actions: read # needed to download artifacts from other workflow runs
      models: read # needed to call the GitHub Models API (GPT-4o)
    env:
      CI: true
      BASE_URL: ${{ secrets.BASE_URL }}
      USER_NAME: ${{ secrets.USER_NAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      API_URL: ${{ secrets.API_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Download results from a specific run (manual dispatch with run_id) ─
      - name: Download results from specified run
        if: github.event_name == 'workflow_dispatch' && inputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.run_id }}
          pattern: test-results-json-*
          path: test-results
          merge-multiple: true
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── PATH C: run a fresh smoke suite (schedule or dispatch without run_id) ─
      - name: Install Playwright (fresh run path)
        if: |
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && inputs.run_id == '')
        run: npx playwright install chromium --with-deps

      - name: Run smoke + API tests (fresh run path)
        if: |
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && inputs.run_id == '')
        env:
          USER_NAME_CHROMIUM: ${{ secrets.USER_NAME_CHROMIUM }}
          PASSWORD_CHROMIUM: ${{ secrets.PASSWORD_CHROMIUM }}
        # || true — allow step to succeed even when tests fail so self-heal can process them
        run: |
          npx playwright test --project=api || true
          npx playwright test --project=chromium --grep @smoke --workers=1 || true

      # ── Merge all results-*.json files into one ────────────────────────────
      # Each artifact (results-chromium.json, results-firefox.json, results-api.json, …)
      # is combined into a single merged-results.json for the diagnostic script.
      - name: Merge results JSON files
        run: |
          node --input-type=module << 'EOF'
          import { mkdirSync, readdirSync, readFileSync, writeFileSync } from 'node:fs'
          import path from 'node:path'

          const dir = 'test-results'
          mkdirSync(dir, { recursive: true })   // ensure directory exists regardless of download outcome

          const files = readdirSync(dir).filter(
            f => f.startsWith('results') && f.endsWith('.json') && f !== 'merged-results.json'
          )

          if (files.length === 0) {
            console.log('[merge] No result JSON files found — creating empty manifest')
            writeFileSync(path.join(dir, 'merged-results.json'), JSON.stringify({ suites: [] }, null, 2))
            process.exit(0)
          }

          const allSuites = []
          for (const f of files) {
            try {
              const data = JSON.parse(readFileSync(path.join(dir, f), 'utf-8'))
              allSuites.push(...(data.suites ?? []))
              console.log(`[merge] Included ${f}`)
            } catch (e) {
              console.warn(`[merge] Could not parse ${f}: ${e.message}`)
            }
          }

          writeFileSync(
            path.join(dir, 'merged-results.json'),
            JSON.stringify({ suites: allSuites }, null, 2)
          )
          console.log(`[merge] Merged ${files.length} file(s) into merged-results.json`)
          EOF

      # ── Run the self-heal diagnostic script ───────────────────────────────
      - name: Discover available GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Available models on this GitHub instance ==="
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://models.inference.ai.azure.com/models \
            | node -e "
              let body='';
              process.stdin.on('data',d=>body+=d);
              process.stdin.on('end',()=>{
                try {
                  const models = JSON.parse(body);
                  const list = Array.isArray(models) ? models : (models.data ?? []);
                  if (list.length === 0) { console.log('(no models returned — check token permissions)'); return; }
                  list.forEach(m => console.log(' -', m.id ?? m.name ?? JSON.stringify(m)));
                  console.log('');
                  console.log('Set the SELF_HEAL_MODEL Actions variable to the model id you want to use.');
                } catch { console.log('Raw response:', body.slice(0, 500)); }
              });
            "

      - name: Run self-heal diagnostic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GPT-4o may need a paid entitlement on Enterprise — Llama models are universally accessible.
          # Set SELF_HEAL_MODEL Actions variable to 'openai/gpt-4o' if your org has it enabled.
          SELF_HEAL_MODEL: ${{ vars.SELF_HEAL_MODEL || 'meta/Meta-Llama-3.1-405B-Instruct' }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
          DRY_RUN_FLAG="--dry-run"
          fi
          node scripts/self-heal.mjs --results test-results/merged-results.json $DRY_RUN_FLAG

      # ── Check whether any patchable files changed ─────────────────────────
      - name: Check for changes
        id: changes
        run: |
          git add bug-reports/ proposed-fixes/ tests/ pages/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # ── Generate PR body from the self-heal summary ───────────────────────
      - name: Generate PR body
        if: steps.changes.outputs.has_changes == 'true' && inputs.dry_run != true
        run: |
          node --input-type=module << 'EOF'
          import { readFileSync, writeFileSync, existsSync } from 'node:fs'

          if (!existsSync('self-heal-summary.json')) {
            writeFileSync('pr-body.md', '## Self-Heal Report\n\nNo summary available.')
            process.exit(0)
          }

          const summary = JSON.parse(readFileSync('self-heal-summary.json', 'utf-8'))
          const patches  = summary.filter(s => s.verdict === 'fix_test').length
          const bugs     = summary.filter(s => s.verdict === 'create_bug_report').length

          const header = '| Test | Verdict | Confidence | Reasoning |'
          const sep    = '|---|---|---|---|'
          const rows = summary
            .map(s => `| ${s.fullTitle ?? s.testTitle} | ${s.verdict} | ${s.confidence ?? '-'} | ${s.reasoning ?? '-'} |`)
            .join('\n')

          const body = [
            '## Self-Heal Report',
            '',
            header,
            sep,
            rows,
            '',
            `**${patches}** test patch(es) applied &bull; **${bugs}** bug report(s) created.`,
            '',
            '> :robot: Generated automatically by the self-heal workflow.',
            '> Review all changes carefully before merging.',
          ].join('\n')

          writeFileSync('pr-body.md', body)
          console.log('[pr-body] Written successfully')
          EOF

      # ── Create branch and open PR ─────────────────────────────────────────
      - name: Create branch and open PR
        if: steps.changes.outputs.has_changes == 'true' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="self-heal/run-${{ github.run_id }}-$(date +%Y%m%d%H%M%S)"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Count patches / bug reports from summary for commit message
          PATCHES=$(node -e "
            const s = require('./self-heal-summary.json');
            console.log(s.filter(x => x.verdict === 'fix_test').length)
          " 2>/dev/null || echo "?")
          BUGS=$(node -e "
            const s = require('./self-heal-summary.json');
            console.log(s.filter(x => x.verdict === 'create_bug_report').length)
          " 2>/dev/null || echo "?")

          git commit -m "fix(self-heal): ${PATCHES} patch(es), ${BUGS} bug report(s) — run #${{ github.run_id }}"
          git push origin "$BRANCH"

          # Prefer main; fall back to master for repos that haven't renamed yet
          gh pr create \
            --title "fix(self-heal): ${PATCHES} patch(es), ${BUGS} bug report(s) — run #${{ github.run_id }}" \
            --body-file pr-body.md \
            --label "self-heal,automated" \
            --base main \
          || gh pr create \
            --title "fix(self-heal): ${PATCHES} patch(es), ${BUGS} bug report(s) — run #${{ github.run_id }}" \
            --body-file pr-body.md \
            --label "self-heal,automated" \
            --base master

      # ── Dry-run: print summary only ───────────────────────────────────────
      - name: Print summary (dry-run)
        if: inputs.dry_run == true
        run: |
          echo "=== DRY-RUN SUMMARY ==="
          cat self-heal-summary.json
          echo ""
          echo "No files were written and no PR was opened."
